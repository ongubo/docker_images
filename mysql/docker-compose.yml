version: "3.1"
services:
  db:
    container_name: mysql_container
    image: mysql:5.7
    restart: always
    networks:
      - mysql_network
    ports:
      - 3306:3306
    volumes:
      - my_cnf:/etc/mysql/conf.d/
      - db_data:/var/lib/mysql
      - ./custom.cnf:/etc/mysql/conf.d/custom.cnf # Mount custom MySQL configuration
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
  phpmyadmin:
    container_name: phpmyadmin_container
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    networks:
      - mysql_network
    ports:
      - 8080:80
      - 443:8443
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - MYSQL_USERNAME=root
      - MYSQL_ROOT_PASSWORD=root
      - UPLOAD_LIMIT=900M
networks:
  mysql_network:
volumes:
  my_cnf:
  db_data:
