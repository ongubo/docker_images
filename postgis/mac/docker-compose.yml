version: "3.8"

services:
  postgis:
    image: postgis/postgis:15-3.3
    container_name: postgis_container
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "15432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5

